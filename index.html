<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Route Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
        }
        #root {
            height: 100%;
        }
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .header {
            background-color: #2c3e50;
            color: white;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .map-container {
            flex-grow: 1;
            position: relative;
        }
        #map {
            height: 100%;
            width: 100%;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        .login-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .login-form {
            background-color: white;
            padding: 2rem;
            border-radius: 5px;
            width: 300px;
        }
        .button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 8px;
        }
        .button:hover {
            background-color: #2980b9;
        }
        .button.stop {
            background-color: #e74c3c;
        }
        .button.stop:hover {
            background-color: #c0392b;
        }
        .button.logout {
            background-color: #7f8c8d;
        }
        .legend {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }
        .legend-color {
            width: 20px;
            height: 10px;
            margin-right: 10px;
        }
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            font-size: 24px;
            color: #333;
        }
        .error-message {
            color: red;
            padding: 10px;
            background-color: #ffeeee;
            border: 1px solid #ffcccc;
            border-radius: 5px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div id="root">
        <!-- Fallback content in case React doesn't load -->
        <div class="loading">Loading Travel Route Tracker...</div>
    </div>

    <!-- Load React, React DOM, and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Fallback script if React doesn't load properly -->
    <script>
        // Check if React loaded properly
        setTimeout(function() {
            if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
                document.getElementById('root').innerHTML = `
                    <div style="padding: 20px; text-align: center;">
                        <h2>Error Loading Application</h2>
                        <p>React libraries failed to load. Please check your internet connection and try again.</p>
                        <button onclick="window.location.reload()" style="padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer;">
                            Refresh Page
                        </button>
                    </div>
                `;
            }
        }, 5000); // Check after 5 seconds
    </script>
    
    <!-- React Components -->
    <script type="text/babel" data-type="module">
        console.log("Script started loading");
        
        // Authentication context
        const AuthContext = React.createContext();
        
        const AuthProvider = ({ children }) => {
            const [user, setUser] = React.useState(null);
            const [loading, setLoading] = React.useState(true);
            
            React.useEffect(() => {
                console.log("AuthProvider useEffect running");
                // Check if user is already logged in
                try {
                    const storedUser = localStorage.getItem('user');
                    if (storedUser) {
                        setUser(JSON.parse(storedUser));
                    }
                } catch (error) {
                    console.error("Error loading user from localStorage:", error);
                }
                setLoading(false);
            }, []);
            
            const login = (userData) => {
                console.log("Logging in user:", userData);
                setUser(userData);
                localStorage.setItem('user', JSON.stringify(userData));
            };
            
            const logout = () => {
                console.log("Logging out user");
                setUser(null);
                localStorage.removeItem('user');
            };
            
            return (
                <AuthContext.Provider value={{ user, login, logout, loading }}>
                    {children}
                </AuthContext.Provider>
            );
        };
        
        // Login Component
        const Login = () => {
            const [username, setUsername] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [error, setError] = React.useState('');
            const { login } = React.useContext(AuthContext);
            
            const handleSubmit = (e) => {
                e.preventDefault();
                try {
                    if (!username.trim()) {
                        setError("Username cannot be empty");
                        return;
                    }
                    // In a real app, you would validate credentials with a server
                    login({ username });
                } catch (error) {
                    console.error("Login error:", error);
                    setError("An error occurred during login. Please try again.");
                }
            };
            
            return (
                <div className="login-container">
                    <div className="login-form">
                        <h2>Login to Track Your Routes</h2>
                        {error && <div className="error-message">{error}</div>}
                        <form onSubmit={handleSubmit}>
                            <div style={{ marginBottom: '1rem' }}>
                                <label htmlFor="username" style={{ display: 'block', marginBottom: '0.5rem' }}>Username</label>
                                <input
                                    type="text"
                                    id="username"
                                    value={username}
                                    onChange={(e) => setUsername(e.target.value)}
                                    style={{ width: '100%', padding: '0.5rem' }}
                                    required
                                />
                            </div>
                            <div style={{ marginBottom: '1rem' }}>
                                <label htmlFor="password" style={{ display: 'block', marginBottom: '0.5rem' }}>Password</label>
                                <input
                                    type="password"
                                    id="password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    style={{ width: '100%', padding: '0.5rem' }}
                                    required
                                />
                            </div>
                            <button type="submit" className="button" style={{ width: '100%' }}>Login</button>
                        </form>
                    </div>
                </div>
            );
        };
        
        // Map Component
        const Map = () => {
            const mapRef = React.useRef(null);
            const leafletMapRef = React.useRef(null);
            const [tracking, setTracking] = React.useState(false);
            const [mapError, setMapError] = React.useState('');
            const [routeData, setRouteData] = React.useState({
                frequentRoutes: [], // Red
                occasionalRoutes: [], // Yellow
                newRoutes: [] // Blue
            });
            const watchIdRef = React.useRef(null);
            const lastPositionRef = React.useRef(null);
            const { user, logout } = React.useContext(AuthContext);
            
            // Initialize map
            React.useEffect(() => {
                console.log("Map useEffect running, mapRef.current:", mapRef.current);
                
                if (!leafletMapRef.current && mapRef.current) {
                    try {
                        console.log("Initializing Leaflet map");
                        leafletMapRef.current = L.map(mapRef.current).setView([51.505, -0.09], 13);
                        
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
                        }).addTo(leafletMapRef.current);
                        
                        // Try to get user's current location
                        if (navigator.geolocation) {
                            navigator.geolocation.getCurrentPosition(
                                (position) => {
                                    const { latitude, longitude } = position.coords;
                                    leafletMapRef.current.setView([latitude, longitude], 13);
                                    console.log("Set map view to user location:", latitude, longitude);
                                },
                                (error) => {
                                    console.warn("Error getting initial location:", error);
                                    // Continue with default location
                                }
                            );
                        }
                        
                        // Load saved routes from localStorage
                        loadRoutes();
                    } catch (error) {
                        console.error("Error initializing map:", error);
                        setMapError("Failed to initialize map. Please refresh the page and try again.");
                    }
                }
                
                return () => {
                    if (leafletMapRef.current) {
                        console.log("Cleaning up Leaflet map");
                        leafletMapRef.current.remove();
                        leafletMapRef.current = null;
                    }
                };
            }, []);
            
            // Load routes from localStorage
            const loadRoutes = () => {
                if (!user) return;
                
                try {
                    const savedRoutes = localStorage.getItem(`routes_${user.username}`);
                    if (savedRoutes) {
                        const parsedRoutes = JSON.parse(savedRoutes);
                        setRouteData(parsedRoutes);
                        
                        // Draw routes on the map
                        drawRoutes(parsedRoutes);
                        console.log("Loaded routes from localStorage:", parsedRoutes);
                    }
                } catch (error) {
                    console.error("Error loading routes:", error);
                }
            };
            
            // Save routes to localStorage
            const saveRoutes = (routes) => {
                if (!user) return;
                try {
                    localStorage.setItem(`routes_${user.username}`, JSON.stringify(routes));
                    console.log("Saved routes to localStorage");
                } catch (error) {
                    console.error("Error saving routes:", error);
                }
            };
